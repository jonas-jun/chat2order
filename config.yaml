# Chat2Order 설정 파일

# Gemini API 설정
gemini:
  model: "gemini-3.1-flash-lite-preview"
  temperature: 0.1

# 출력 파일 설정
output:
  file_name: "orders_extracted.xlsx"
  sheet_name: "주문내역"

# 출력 칼럼 설정 (출력명: 원본필드명, null이면 빈 칼럼)
output_columns:
  주문번호: order_number
  상품명: product
  옵션명: option
  수량: volume
  채팅명: chat_name
  수령자: order_name
  전화번호: phone_number
  주소: address
  우편번호: zip_code

# CSV 파싱 설정
csv:
  filename_prefix: "다애모드(daae_mode)_"
  exclude_messages:
    - "'다애모드(daae_mode)' 채널을 추가해 주셔서 감사합니다."
    - "오늘의 라이브 특가입니다♥️"
    - "친구 추가시 첫구매 무배!"
    - "다애모드(daae_mode) 채널을 추가하시면 광고와 마케팅 메시지를 카카오톡으로 받아 볼 수 있습니다."
    - "알림톡/친구톡 메시지는 관리자센터에서 확인할 수 없습니다."

# LLM 프롬프트
prompt:
  order_extraction: |
    너는 쇼핑몰의 메신저 대화에서 주문 데이터를 추출하는 전문가야.
    아래 제공된 '상품 카탈로그'를 기준으로, '고객 대화 내역'을 분석해서 주문자의 이름, 연락처, 주소, 주문상품, 옵션, 수량을 추출해.

    [상품 카탈로그]
    {catalog}

    [고객 대화 내역]
    {chat}

    지시사항:
    1. 대화 내역에서 주문이 확정된 내역(입금 완료 등)을 위주로 추출해.
    2. 주문이 없는 건은 row에 추가하지 말아줘.
    3. 상품명(product)과 옵션(option)은 반드시 카탈로그에 있는 가장 유사한 상품명으로 매핑해.
    4. 색상, 사이즈 등의 옵션(option)이 있다면 분리해서 적고, 수량(volume)은 정수로 적어.
    5. order_name은 배송 받을 실제 이름이야. 고객이 별도로 배송 이름을 알려준 경우에만 적고, 그렇지 않으면 null로 비워둬.
    6. address는 고객이 말한 전체 주소를 그대로 적어.
    7. search_address는 우편번호 검색용으로, address에서 동/호수 등 상세주소(아파트 동호수, 건물명 등)를 제거하고 도로명+건물번호까지만 적어. (예: "부산 북구 백양대로1050번길 16")
    8. 대화에서 파악할 수 없는 정보는 null로 비워둬.
  
  address_to_search: |
    아래 주소에서 우편번호 검색에 사용할 수 있도록 도로명주소(도로명+건물번호)만 추출해줘.
    - 아파트 동/호수, 건물명, 상세주소 등은 제거하고, "시/도 구/군 도로명 건물번호" 형태로 추출해. (예: "부산 북구 백양대로1050번길 16")
    - 도로명주소를 추출할 수 없는 경우 null로 응답해.

    [주소]
    {address}

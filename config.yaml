# Chat2Order 설정 파일

# Gemini API 설정
gemini:
  model: "gemini-3.1-flash-lite-preview"
  temperature: 0.1

# 출력 파일 설정
output:
  file_name: "orders_extracted.xlsx"
  sheet_name: "주문내역"

# 출력 칼럼 설정 (출력명: 원본필드명, null이면 빈 칼럼)
output_columns:
  주문번호: order_number
  상품명: product
  옵션명: option
  수량: volume
  채팅명: chat_name
  수령자: order_name
  전화번호: phone_number
  주소: address
  우편번호: zip_code

# CSV 파싱 설정
csv:
  filename_prefix: "다애모드(daae_mode)_"
  exclude_messages:
    - "'다애모드(daae_mode)' 채널을 추가해 주셔서 감사합니다."
    - "오늘의 라이브 특가입니다♥️"
    - "친구 추가시 첫구매 무배!"
    - "다애모드(daae_mode) 채널을 추가하시면 광고와 마케팅 메시지를 카카오톡으로 받아 볼 수 있습니다."
    - "알림톡/친구톡 메시지는 관리자센터에서 확인할 수 없습니다."
